<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diesel Ultra - Ultimate Edition</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --sidebar: #151921; --accent: #00d2ff; --me: #005c4b; --text: #fff; --system: #2a2f3b; --danger: #ff4b4b; --reply-bg: rgba(0, 210, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; transition: background 0.3s; }
        
        body.aero-mode { background: url('fon.png') no-repeat center center fixed; background-size: cover; }
        body.aero-mode .sidebar, body.aero-mode .main, body.aero-mode #auth-screen, body.aero-mode .card, body.aero-mode .fab-menu { background: rgba(0, 0, 0, 0.4) !important; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }

        .sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); transition: 0.3s; z-index: 10; position: relative; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: #080a0f; width: 100%; overflow: hidden; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; flex-shrink: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .card { background: var(--sidebar); padding: 20px; border-radius: 20px; width: 90%; max-width: 320px; border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 10px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; cursor: pointer; user-select: none; }
        .bubble.me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 2px; }
        .bubble.other { align-self: flex-start; background: #262d31; border-bottom-left-radius: 2px; }
        .reply-msg-block { border-left: 3px solid var(--accent); background: var(--reply-bg); padding: 5px 8px; border-radius: 5px; margin-bottom: 5px; font-size: 12px; }
        .reply-msg-block b { color: var(--accent); display: block; }
        .comment-btn { font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 10px; margin-top: 5px; display: inline-block; cursor: pointer; }
        input, textarea { background: var(--system); color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; outline: none; font-family: inherit; font-size: 16px; transition: border 0.2s; }
        input:focus, textarea:focus { border: 1px solid var(--accent); }
        button { background: var(--accent); border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; color:#000; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #444 !important; color: #777 !important; cursor: not-allowed; opacity: 1; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .fab-container { position: absolute; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-start; }
        .fab-menu { display: none; flex-direction: column; gap: 6px; margin-bottom: 15px; background: var(--sidebar); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); width: max-content; max-height: 60vh; overflow-y: auto; }
        .fab-menu button { width: 100%; text-align: left; background: transparent; color: white; border-radius: 5px; padding: 10px 12px; justify-content: flex-start; }
        .fab-menu button:hover { background: rgba(255,255,255,0.1); }
        .fab-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); transition: transform 0.2s; }
        .fab-btn:active { transform: scale(0.9); }
        .context-menu { position: fixed; background: #1c242f; border-radius: 8px; border: 1px solid #333; z-index: 9999; display: none; flex-direction: column; width: max-content; min-width: 160px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .context-menu div.ctx-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #2a323d; font-size: 14px; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .context-menu div.ctx-item:hover { background: rgba(255,255,255,0.1); }
        #reply-preview { display: none; background: rgba(0,0,0,0.3); padding: 10px; border-left: 4px solid var(--accent); align-items: center; }
        @media (max-width: 768px) { 
            .sidebar { position: absolute; left: -100%; height: 100%; width: 100%; max-width: 320px; } 
            .sidebar.active { left: 0; } 
            #back-btn { display: flex !important; }
            .card { width: 95%; }
        }
        .auth-tab { flex:1; padding: 10px; cursor: pointer; border-bottom: 2px solid #444; font-weight: bold; transition: 0.2s; }
        .auth-tab.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .bot-tab { flex:1; padding: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        #ide-modal textarea { height: 150px; font-family: monospace; font-size: 13px; resize: none; }
        #call-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:5000; flex-direction:column; align-items:center; justify-content:center; }
        video { background:#222; border-radius:15px; object-fit:cover; }
        #remote-video { width:100%; max-width:800px; height:60vh; border:2px solid #444; }
        #local-video { width:120px; height:160px; position:absolute; bottom:30px; right:30px; border:2px solid var(--accent); box-shadow:0 0 15px var(--accent); }
        .reactions-box { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .react-pill { background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:12px; font-size:14px; cursor:pointer; user-select:none; display:flex; align-items:center; gap:4px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .react-pill.active { background:var(--reply-bg); border: 1px solid var(--accent); }
        .context-menu-react { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:12px; border-bottom:1px solid #2a323d; background: #151921; }
        .context-menu-react span { cursor: pointer; transition: transform 0.2s; user-select: none; font-size: 24px; }
        .context-menu-react span:hover { transform: scale(1.3); }
        #typing-indicator { font-size:12px; color:var(--accent); display:none; position:absolute; bottom:75px; left:20px; z-index:100; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:10px; }
        .ui-icon { width: 24px; height: 24px; vertical-align: middle; object-fit: contain; flex-shrink: 0; cursor: pointer; }
        
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.1); border-color: #fff; }
    </style>
</head>
<body onclick="hideContextMenu()">

<div id="sys-modal" class="overlay" style="z-index:99999;">
    <div class="card" style="text-align:center; width:280px; padding: 25px;">
        <div id="sys-msg" style="margin-bottom:25px; font-size:16px; color:#fff;"></div>
        <div style="display:flex; gap:10px;">
            <button id="sys-btn-ok" style="flex:1;">ОК</button>
            <button id="sys-btn-cancel" style="flex:1; background:#444; color:#fff; display:none;">ОТМЕНА</button>

    </div>
</div>

<div id="ui-modal" class="overlay">

</div>

<div id="ide-modal" class="overlay">
    <div class="card" style="width: 90%; max-width: 500px;">
        <h3>Настройка бота <span id="ide-bot-name" style="color:var(--accent)"></span></h3>
        <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:10px;">
            <div id="tab-simple" class="bot-tab" onclick="switchBotTab('simple')" style="background:var(--accent); color:#000;">Простой</div>
            <div id="tab-js" class="bot-tab" onclick="switchBotTab('js')" style="background:#444; color:#fff;">JS Код</div>
        </div>
        <div id="bot-simple-area">
            <input type="text" id="bot-trigger" placeholder="Если пишут (например: привет)">

            <button onclick="addBotRule()" style="width:100%; margin-top:5px;">+ Добавить правило</button>
            <div id="bot-rules-list" style="margin-top:10px; max-height:120px; overflow-y:auto; border-top:1px solid #444; padding-top:5px;"></div>
        </div>
        <div id="bot-js-area" style="display:none;">
            <textarea id="ide-code" placeholder="if(msg.text === '/start') { send('Привет!'); }"></textarea>

<div id="call-modal">
    <h3 style="position:absolute; top:20px; color:white;" id="call-status">Установка соединения...</h3>

            <img src="icon_endcall.png" style="width:32px; height:32px;">

</div>

<div id="context-menu" class="context-menu">
    <div class="context-menu-react">
        <span onclick="addReaction('❤️')">❤️</span>
        <span onclick="addReaction('👍')">👍</span>
        <span onclick="addReaction('😂')">😂</span>

</div>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="text-align: center;">
        <h1 style="color: var(--accent); margin-top:0;">DIESEL</h1>
        <div id="step-login">
            <div style="display:flex; margin-bottom:15px;">
                <div id="auth-tab-login" class="auth-tab active" onclick="setAuthMode('login')">ВХОД</div>

            <input type="text" id="auth-user" placeholder="Логин (ID на английском)">

            <button onclick="startAuth()" style="width:100%; margin-top:10px;">ПРОДОЛЖИТЬ</button>

        <div id="step-code" style="display:none">
            <p>Введите код из почты</p>
            <input type="text" id="auth-code" maxlength="4" style="text-align:center; font-size:24px; letter-spacing: 5px;">
            <button onclick="verifyAuth()" style="width:100%; margin-top:10px;">ВОЙТИ</button>
            <button onclick="location.reload()" style="width:100%; margin-top:10px; background:transparent; color:#fff; border:1px solid #444;">Назад</button>
        </div>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div style="padding: 15px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="openProfile()">
        <img id="my-ava-img" src="" class="avatar" style="width:40px; height:40px;">
        <div style="flex:1; overflow: hidden; text-overflow: ellipsis;"><b id="my-nick-display" style="white-space: nowrap;">...</b><br><small id="my-id-display" style="color:var(--accent)"></small></div>
        <img src="icon_settings.png" class="ui-icon" style="width:24px; height:24px;" alt="Настройки">
    </div>
    <div id="chat-list" style="flex:1; overflow-y:auto; padding-bottom: 90px;"></div>
    
    <div class="fab-container">
        <div class="fab-menu" id="fab-menu">
            <button onclick="addContactPrompt('user')">Добавить друга</button>
            <div style="height:1px; background:rgba(255,255,255,0.1); margin: 2px 0;"></div>
            <button onclick="createEntityPrompt('group')">Создать чат</button>
            <button onclick="addContactPrompt('group')">Добавить чат</button>

            <button onclick="addContactPrompt('channel')">Добавить канал</button>

<div class="main">
    <div id="chat-header" style="padding: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; min-height: 45px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="toggleSidebar()" id="back-btn" style="display:none; background:transparent; padding:0;">
                <img src="icon_back.png" class="ui-icon">
            </button>
            <button onclick="exitThread()" id="thread-back-btn" style="display:none; background:rgba(255,255,255,0.1); color:#fff; padding:8px 12px;">
                <img src="icon_back.png" style="width:16px; height:16px;"> Назад
            </button>
            <div><b id="active-title">Выберите чат</b><br><small id="active-info" style="color:var(--accent)"></small></div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button id="call-btn" onclick="startCall()" style="display:none; background:transparent; padding:0;">
                <img src="icon_call.png" class="ui-icon">
            </button>
            <button id="ide-btn" onclick="openIDE()" style="display:none; background:#28a745; color:white; padding:8px 12px;">
                <img src="icon_bot.png" style="width:16px; height:16px;"> IDE
            </button>
            <img id="header-ava" src="" style="width:40px; height:40px; border-radius:50%; display:none; cursor:pointer; flex-shrink:0;" onclick="showEntityInfo()">
        </div>
    </div>
    <div id="empty-state" style="flex:1; display:flex; align-items:center; justify-content:center; color:#555; font-size:16px; text-align: center; padding: 20px;">
        Выберите, кому хотели бы написать
    </div>
    <div id="messages" style="display:none;"></div>
    <div id="typing-indicator"></div>
    <div id="reply-preview">
        <div style="flex:1; font-size:12px;"><b id="reply-name" style="color:var(--accent)"></b><div id="reply-text"></div></div>
        <button onclick="cancelReply()" style="background:transparent; color:#fff; font-size: 16px; padding:0;">✕</button>
    </div>
    <div id="input-area" style="padding:15px; background:rgba(0,0,0,0.2); display:none; gap:10px; align-items:center;">
        <button id="attach-btn" onclick="attachPhotoPrompt()" style="background:transparent; padding:0; display:flex; align-items:center; justify-content:center;">
            <img src="icon_attach.png" class="ui-icon">
        </button>
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button id="send-btn" onclick="sendMsg()" style="padding:10px;">
            <img src="icon_send.png" style="width:20px; height:20px;">
        </button>
    </div>
</div>

<script>
    const BASE = "https://diesel-c8b6a-default-rtdb.firebaseio.com";
    const DEF_AVA = "https://basket-25.wbbasket.ru/vol4382/part438234/438234188/images/big/1.webp";
    const SESSION_TIME = 15 * 60 * 1000; 
    const E2E_KEY = "DieselSecureCoreX199";

    let MY_ID = "", MY_NICK = "", MY_AVA = "", ACTIVE_CHAT = "", MY_TYPE = "";
    let lastChatHash = "", lastMsgHash = "", replyData = null, ctxTarget = null;
    let isThread = false, mainChannelId = ""; 
    let authMode = 'login', tempAuthData = {};
    let currentBotRules = [], currentBotMode = 'simple';
    
    let peer = null, currentCall = null, localStream = null;
    let typingTimer;

    emailjs.init("L0fjG_jIAPW3x015-");

    function initTheme() {
        let t = localStorage.getItem('diesel_theme');
        if(t) setTheme(t);
        if(localStorage.getItem('diesel_aero') === 'true') document.body.classList.add('aero-mode');
    }

    function setTheme(color) {
        document.documentElement.style.setProperty('--accent', color);
        let r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        document.documentElement.style.setProperty('--reply-bg', `rgba(${r},${g},${b},0.1)`);
        localStorage.setItem('diesel_theme', color);
    }

    function toggleAero() {
        let st = document.body.classList.toggle('aero-mode');
        localStorage.setItem('diesel_aero', st);
    }

    function enc(str) {
        if(!str) return str;
        return btoa(encodeURIComponent(str).split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^E2E_KEY.charCodeAt(i%E2E_KEY.length))).join(''));
    }
    function dec(str) {
        if(!str) return str;
        try{return decodeURIComponent(atob(str).split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^E2E_KEY.charCodeAt(i%E2E_KEY.length))).join(''));}catch(e){return str;}
    }

    function customAlert(msg) {
        document.getElementById('sys-msg').innerText = msg;
        document.getElementById('sys-btn-cancel').style.display = 'none';
        document.getElementById('sys-modal').style.display = 'flex';
        document.getElementById('sys-btn-ok').onclick = () => { document.getElementById('sys-modal').style.display = 'none'; };
    }

    function customConfirm(msg, onYes, onNo) {
        document.getElementById('sys-msg').innerText = msg;
        document.getElementById('sys-btn-cancel').style.display = 'block';
        document.getElementById('sys-modal').style.display = 'flex';
        document.getElementById('sys-btn-ok').onclick = () => {
            document.getElementById('sys-modal').style.display = 'none';
            if(onYes) onYes();
        };
        document.getElementById('sys-btn-cancel').onclick = () => {
            document.getElementById('sys-modal').style.display = 'none';
            if(onNo) onNo();
        };
    }

    setInterval(() => {
        if(MY_ID) localStorage.setItem('diesel_expiry', Date.now() + SESSION_TIME);
    }, 10000);

    async function checkSession() {
        initTheme();
        const savedId = localStorage.getItem('my_diesel_id');
        const expiry = localStorage.getItem('diesel_expiry');
        if (savedId && expiry) {
            if (Date.now() < parseInt(expiry)) {
                let user = await (await fetch(`${BASE}/users/${savedId}.json`)).json();
                if (user) { loginSuccess(user); return; }
            } else {
                localStorage.removeItem('my_diesel_id');
                localStorage.removeItem('diesel_expiry');
            }
        }
        document.getElementById('auth-screen').style.display = 'flex';
    }

    function setAuthMode(mode) {
        authMode = mode;
        document.getElementById('auth-tab-login').className = `auth-tab ${mode==='login'?'active':''}`;
        document.getElementById('auth-tab-reg').className = `auth-tab ${mode==='reg'?'active':''}`;
        document.getElementById('auth-email').style.display = mode === 'reg' ? 'block' : 'none';
    }

    function isInvalidId(str) { return /[а-яА-ЯёЁ\s]/.test(str); }

    async function startAuth() {
        const rawUser = document.getElementById('auth-user').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        const id = rawUser.startsWith('@') ? rawUser : '@' + rawUser;

        if (!rawUser || !pass || isInvalidId(rawUser) || id.length < 3) { customAlert("Ошибка! ID должен быть на английском, без пробелов."); return; }
        const code = Math.floor(1000 + Math.random() * 9000).toString();

        if (authMode === 'login') {
            let userObj = await (await fetch(`${BASE}/users/${id}.json`)).json();
            if(!userObj) { customAlert("Аккаунт не найден!"); return; }
            if(userObj.pass !== pass) { customAlert("Неверный пароль!"); return; }
            tempAuthData = { code, email: userObj.email, pass, type: 'login' };
            await sendEmailCode(userObj.email, code);
        } else {
            const email = document.getElementById('auth-email').value.trim();
            if(!email) { customAlert("Введите Email!"); return; }
            let userExists = await (await fetch(`${BASE}/users/${id}.json`)).json();
            if(userExists) { customAlert("Этот ID уже занят!"); return; }
            tempAuthData = { code, email, pass, type: 'reg' };
            await fetch(`${BASE}/auth_temp/${id}.json`, { method:'PUT', body: JSON.stringify(tempAuthData) });
            await sendEmailCode(email, code);
        }
    }

    function startCall() {
        if(!peer || MY_TYPE !== 'user' || !ACTIVE_CHAT) return;
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
            document.getElementById('call-modal').style.display = 'flex';
            document.getElementById('call-status').innerText = "Звоним...";
            let call = peer.call(ACTIVE_CHAT.replace('@', 'usr_'), stream);
            currentCall = call;
            call.on('stream', remoteStream => {
                document.getElementById('call-status').innerText = "На связи";
                document.getElementById('remote-video').srcObject = remoteStream;
            });
            call.on('close', endCall);
            call.on('error', endCall);
        }).catch(e => customAlert("Ошибка доступа к камере/микрофону"));
    }

    function endCall() {
        if(currentCall) { currentCall.close(); currentCall = null; }
        if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
        document.getElementById('call-modal').style.display = 'none';

        document.getElementById('local-video').srcObject = null;

            fetch(`${BASE}/contacts/${ACTIVE_CHAT}/${MY_ID}.json`, { method:'PUT', body: JSON.stringify({ type: 'user' }) });

        await fetch(`${BASE}/chats/${room}.json`, { method:'POST', body: JSON.stringify(msg) });

    async function triggerBotLogic(botId, userText, room) {
        let botConfig = await (await fetch(`${BASE}/bots_code/${botId}.json`)).json();
        let botInfo = await (await fetch(`${BASE}/users/${botId}.json`)).json();
        if(!botConfig || !botInfo) return;

        let botReplyText = null;

        if (botConfig.mode === 'simple' && botConfig.rules) {
            let found = botConfig.rules.find(r => userText.toLowerCase().includes(r.trigger.toLowerCase()));
            if (found) botReplyText = found.response;
        } else if (botConfig.mode === 'js' && botConfig.code) {
            try {
                const botFunc = new Function('msg', 'send', botConfig.code);
                botFunc({ text: userText }, (txt) => { botReplyText = txt; });
            } catch(e) {}
        }

        if (botReplyText) {
            setTimeout(async () => {
                const reply = { sid: botId, sender: botInfo.nick, text: enc(botReplyText), ts: Date.now() };
                await fetch(`${BASE}/chats/${room}.json`, { method:'POST', body: JSON.stringify(reply) });
                lastMsgHash = ""; sync();
            }, 800);
        }
    }

    async function handleReaction(mid, emoji) {
        let room = getRoomId();
        let path = `${BASE}/chats/${room}/${mid}/reactions.json`;
        let allReactions = await (await fetch(path)).json() || {};
        
        let currentUsers = allReactions[emoji] || [];
        let hasReacted = currentUsers.includes(MY_ID);
        
        if (hasReacted) {
            currentUsers = currentUsers.filter(id => id !== MY_ID);
            if (currentUsers.length === 0) delete allReactions[emoji];
            else allReactions[emoji] = currentUsers;
        } else {
            let count = 0;
            for (let e in allReactions) {
                if (allReactions[e].includes(MY_ID)) count++;
            }
            if (count >= 2) {
                customAlert("Максимум 2 реакции на сообщение!");
                return;
            }
            currentUsers.push(MY_ID);
            allReactions[emoji] = currentUsers;
        }
        
        await fetch(path, {method:'PUT', body: JSON.stringify(allReactions)});
        lastMsgHash = ""; sync();
    }

    function addReaction(emoji) {
        hideContextMenu();
        handleReaction(ctxTarget.mid, emoji);
    }
    
    function toggleReact(mid, emoji) {
        handleReaction(mid, emoji);
    }

    let pressTimer;
    function handleTouchStart(e, m, mid) { pressTimer = setTimeout(() => { showCtx(e.touches[0], m, mid); }, 500); }
    function handleTouchEnd() { clearTimeout(pressTimer); }
    
    function showCtx(e, m, mid) { 
        ctxTarget = { ...m, mid }; 
        const menu = document.getElementById('context-menu'); 
        menu.style.display = 'flex'; 
        
        let x = e.pageX || (e.touches && e.touches[0].pageX);
        let y = e.pageY || (e.touches && e.touches[0].pageY);
        
        if (x + menu.offsetWidth > window.innerWidth) { x = window.innerWidth - menu.offsetWidth - 10; }
        if (y + menu.offsetHeight > window.innerHeight) { y = window.innerHeight - menu.offsetHeight - 10; }
        
        menu.style.left = x + 'px'; 
        menu.style.top = y + 'px'; 
    }
    
    function hideContextMenu() { document.getElementById('context-menu').style.display = 'none'; }

    function openThread(mid) {
        isThread = true; mainChannelId = ACTIVE_CHAT; ACTIVE_CHAT = `${mainChannelId}_${mid}`;
        document.getElementById('active-title').innerText = "Комментарии";
        document.getElementById('thread-back-btn').style.display = 'flex'; lastMsgHash = ""; sync();
    }
    function exitThread() {
        isThread = false; ACTIVE_CHAT = mainChannelId;
        document.getElementById('active-title').innerText = "Чат";
        document.getElementById('thread-back-btn').style.display = 'none'; lastMsgHash = ""; sync();
    }

    async function sync() {
        if(!MY_ID) return;
        if(!isThread) {
            let cData = await (await fetch(`${BASE}/contacts/${MY_ID}.json`)).json();
            if(JSON.stringify(cData) !== lastChatHash) {
                lastChatHash = JSON.stringify(cData);
                const list = document.getElementById('chat-list'); list.innerHTML = "";
                for(let id in cData) {
                    let info = await (await fetch(`${BASE}/users/${id}.json`)).json() || await (await fetch(`${BASE}/entities/${id}.json`)).json();
                    if(!info) continue;
                    let div = document.createElement('div');
                    div.style = "padding:12px; display:flex; gap:10px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05);";
                    div.innerHTML = `<img src="${info?.ava || DEF_AVA}" class="avatar"><div style="flex:1; overflow:hidden; text-overflow:ellipsis;"><b style="white-space:nowrap;">${info?.nick || info?.name || id}</b></div>`;
                    
                    div.onclick = () => {
                        ACTIVE_CHAT = id; MY_TYPE = cData[id].type || 'user'; isThread = false;
                        document.getElementById('active-title').innerText = info?.nick || info?.name;
                        document.getElementById('active-info').innerText = id;
                        document.getElementById('thread-back-btn').style.display = 'none';
                        const hAva = document.getElementById('header-ava');
                        hAva.src = info?.ava || DEF_AVA; hAva.style.display = 'block';
                        document.getElementById('ide-btn').style.display = (MY_TYPE === 'bot' && info?.owner === MY_ID) ? 'flex' : 'none';
                        document.getElementById('call-btn').style.display = (MY_TYPE === 'user') ? 'block' : 'none';
                        document.getElementById('input-area').style.display = 'flex';
                        document.getElementById('empty-state').style.display = 'none';
                        document.getElementById('messages').style.display = 'flex';
                        
                        if (window.innerWidth <= 768) {
                            document.getElementById('sidebar').classList.remove('active');
                        }
                        
                        lastMsgHash = ""; sync();
                    };
                    list.appendChild(div);
                }
            }
        }

        if(ACTIVE_CHAT) {
            if(MY_TYPE === 'user' && !isThread) {
                let typ = await (await fetch(`${BASE}/typing/${getRoomId()}.json`)).json();
                let isT = false;
                for(let uid in typ) { if(uid !== MY_ID && Date.now() - typ[uid] < 3000) { isT = true; break; } }
                document.getElementById('typing-indicator').style.display = isT ? 'block' : 'none';
                document.getElementById('typing-indicator').innerText = isT ? "Печатает..." : "";
            } else { document.getElementById('typing-indicator').style.display = 'none'; }

            let mData = await (await fetch(`${BASE}/chats/${getRoomId()}.json`)).json();
            if(JSON.stringify(mData) !== lastMsgHash) {
                lastMsgHash = JSON.stringify(mData);
                const box = document.getElementById('messages'); box.innerHTML = "";
                for(let mid in mData) {
                    let m = mData[mid], b = document.createElement('div');
                    m.text = dec(m.text); m.img = dec(m.img); 
                    if(m.reply) m.reply.text = dec(m.reply.text);

                    b.className = `bubble ${m.sid === MY_ID ? 'me' : 'other'}`;
                    
                    let rHtml = m.reply ? `<div class="reply-msg-block"><b>${m.reply.sender}</b>${m.reply.text}</div>` : "";
                    let imgHtml = m.img ? `<img src="${m.img}" style="max-width:100%; max-height:300px; border-radius:10px; margin-bottom:5px; display:block;" onerror="this.style.display='none'">` : "";
                    let threadHtml = (['channel', 'group'].includes(MY_TYPE) && !isThread) ? `<div class="comment-btn" onclick="openThread('${mid}')">💬 Ответить</div>` : "";
                    
                    let reactHtml = "";
                    if(m.reactions) {
                        reactHtml = `<div class="reactions-box">`;
                        for(let emoji in m.reactions) {
                            let uids = m.reactions[emoji];
                            let active = uids.includes(MY_ID) ? 'active' : '';
                            reactHtml += `<span class="react-pill ${active}" onclick="toggleReact('${mid}', '${emoji}')">${emoji} ${uids.length}</span>`;
                        }
                        reactHtml += `</div>`;
                    }

                    b.innerHTML = `${rHtml}${imgHtml}<small style="color:var(--accent)">${m.sender}</small><div style="margin-top:2px; word-break: break-word;">${m.text}</div>${reactHtml}${threadHtml}`;
                    b.oncontextmenu = (e) => { e.preventDefault(); showCtx(e, m, mid); };
                    b.ondblclick = () => { ctxTarget = { ...m, mid }; ctxReply(); };
                    b.ontouchstart = (e) => handleTouchStart(e, m, mid);
                    b.ontouchend = handleTouchEnd; b.ontouchmove = handleTouchEnd;
                    box.appendChild(b);
                }
                box.scrollTop = box.scrollHeight;
            }
        }
    }

    checkSession();
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.add('active');
    }
</script>
</body>
</html>
